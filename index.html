<head>

                    <div class="homebg-img-container size2" style="--delay:-1;--s2:-17vw"><img src="https://upload.wikimedia.org/wikipedia/en/9/9b/Tame_Impala_-_Currents.png" alt=""></div>

            </div>

        <div class="page2">

            <div class="explore-container-wrapper">

                    <div class="explore-cursor">Click</div>
